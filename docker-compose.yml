# Local dev — Postgres only. The FastAPI app and Vite dev server still
# run on the host (or in your IDE) so hot-reload stays instant. Apply
# the schema with:
#
#   docker compose up -d
#   psql "$DATABASE_URL" -f backend/migrations/001_init.sql
#
# where DATABASE_URL is the one in backend/.env (see .env.example).

services:
  postgres:
    image: postgres:16
    container_name: ifmlogix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ifmlogix
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - ifmlogix_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d ifmlogix"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ifmlogix_pgdata:
