services:

  db:
    image: postgres:16-alpine
    container_name: logfi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: logfi
      POSTGRES_PASSWORD: logfi123
      POSTGRES_DB: logfi
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logfi -d logfi"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.dev
      target: backend
    container_name: logfi-backend
    restart: unless-stopped
    environment:
      DEV_MODE: "true"
      DATABASE_URL: postgresql://logfi:logfi123@db:5432/logfi
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.dev
      target: frontend
    container_name: logfi-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
  frontend_modules:
